<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .dashboard-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }
        .user-icon { font-size: 3rem; color: #38bdf8; margin-bottom: 20px; }
        .status-pill {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid #4ade80;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-card text-center">
        <div class="user-icon">👤</div>
        <h2 class="mb-2">Welcome, {{ current_user.username }}!</h2>
        <div class="mb-4">
            <span class="status-pill">Encrypted Session Active</span>
        </div>

        <div class="row text-start mb-4 bg-dark p-3 rounded border border-secondary">
            <div class="col-6 small text-secondary">USER ID:</div>
            <div class="col-6 small text-info text-end">#00{{ current_user.id }}</div>
            <div class="col-6 small text-secondary">SECURITY LEVEL:</div>
            <div class="col-6 small text-info text-end">Authorized User</div>
        </div>

        <p class="text-secondary mb-4">You have successfully bypassed the secure login gateway. All actions are now being logged in the secure database.</p>

        <a href="/logout" class="btn btn-outline-danger w-100">Terminate Session (Logout)</a>
    </div>
</body>
</html>
