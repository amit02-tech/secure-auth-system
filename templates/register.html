<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Register | Sentinel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        .form-control:focus { background: #1e293b; color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #1d4ed8 100%); border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="text-center mb-4" style="color: #38bdf8;">Create Account</h2>
        <p class="text-secondary text-center small mb-4">Join the secure network</p>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small text-secondary">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-secondary">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create secure password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register Identity</button>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-secondary">Already have access? <a href="/login" class="text-info text-decoration-none">Login here</a></p>
        </div>
    </div>
</body>
</html>
