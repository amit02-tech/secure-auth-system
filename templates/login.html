<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; }
        .auth-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 40px; width: 100%; max-width: 400px; margin: auto; }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #1d4ed8 100%); border: none; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h2 class="mb-4">Secure Login</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Access System</button>
        </form>
        <p class="mt-3 small">Don't have an account? <a href="/register" class="text-info">Register here</a></p>
    </div>
</body>
</html>
